<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نصيحة أمن سيبراني</title>
  <style>
    body {
      background-color: #000; /* خلفية سوداء */
      color: #ff0000; /* نص أحمر */
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .tip {
      font-size: 2em;
      margin: 20px;
    }
    img {
      max-width: 300px;
      margin: 20px;
      border: 3px solid #ff0000;
      border-radius: 10px;
    }
    button {
      padding: 10px 20px;
      font-size: 1em;
      background-color: #ff0000;
      color: #000;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background-color: #cc0000;
    }
  </style>
</head>
<body>
  <h1>نصيحة أمن سيبراني</h1>
  <div class="tip" id="tipText">لا تشارك كلمة المرور مع أي شخص.</div>
  <img id="tipImage" src="https://via.placeholder.com/300x200.png?text=Cyber+Security" alt="نصيحة سيبرانية">
  <button onclick="nextTip()">نصيحة جديدة</button>

  <script>
    const tips = [
      {text: "لا تشارك كلمة المرور مع أي شخص.", img: "https://via.placeholder.com/300x200.png?text=Password+Safe"},
      {text: "تأكد من الرابط قبل الضغط عليه.", img: "https://via.placeholder.com/300x200.png?text=Check+Link"},
      {text: "فعّل التحقق بخطوتين.", img: "https://via.placeholder.com/300x200.png?text=2FA"},
      {text: "لا تفتح ملفات مجهولة المصدر.", img: "https://via.placeholder.com/300x200.png?text=Unknown+Files"}
    ];

    let current = 0;

    function nextTip() {
      current = (current + 1) % tips.length;
      document.getElementById("tipText").textContent = tips[current].text;
      document.getElementById("tipImage").src = tips[current].img;
    }
  </script>
</body>
</html>
